# Gradle JVM memory settings (Fix Java heap space error)
org.gradle.jvmargs=-Xmx4096M -XX:MaxMetaspaceSize=1024m -Djava.net.preferIPv4Stack=true

# Enable AndroidX (required for Flutter + Firebase)
android.useAndroidX=true

# Automatically migrate old support libraries
android.enableJetifier=true

# Improve build performance
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true

# Kotlin code style (safe default)
kotlin.code.style=official