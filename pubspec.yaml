name: mycityconnect
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_database: ^12.2.0

  # UI & Utilities
  shared_preferences: ^2.2.2
  image_picker: ^1.0.5
  url_launcher: ^6.2.1
  http: ^1.1.0
  intl: ^0.19.0

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^2.7.0

  cupertino_icons: ^1.0.2
  firebase_storage: ^13.3.0
  cloud_firestore: ^6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/